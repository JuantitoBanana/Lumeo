spring.application.name=lumeo

# Configurar servidor para escuchar en todas las interfaces
server.address=0.0.0.0
server.port=${PORT:8080}

# Configuración de base de datos usando variables de entorno
spring.datasource.url=${DATABASE_URL:jdbc}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Configuration - Optimizado para Transaction Pooler
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false

# Desactivar prepared statements y batching para Transaction Pooler
spring.jpa.properties.hibernate.jdbc.batch_size=0
spring.jpa.properties.hibernate.order_inserts=false
spring.jpa.properties.hibernate.order_updates=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.default_schema=public

# HikariCP - Configuración agresiva para cerrar conexiones rápidamente
# Pool muy pequeño para evitar exceder límites de Supabase
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.max-lifetime=60000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.auto-commit=true

# Deshabilitar keepalive para cerrar conexiones inactivas
spring.datasource.hikari.keepalive-time=0

# Desactivar prepared statements cache
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheSizeMiB=0

# Configuración de transacciones - Timeout corto
spring.jpa.properties.hibernate.connection.autocommit=true
spring.transaction.default-timeout=10

# Actuator Health Check Configuration
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.health.db.enabled=true